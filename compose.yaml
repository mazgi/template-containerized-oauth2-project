services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: localauth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfiles.d/backend/Dockerfile
    command:
      - sh
      - -c
      - |
        npm-check-updates --upgrade
        sort-package-json
        pnpm install
        pnpm audit --fix
        pnpm install
        pnpm exec prisma generate
        pnpm exec prisma db push --accept-data-loss
        pnpm dev
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    working_dir: /work/backend
    volumes:
      - .:/work
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const n=require('net');const s=n.createConnection(4000,'localhost');s.on('connect',()=>{s.destroy();process.exit(0)});s.on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  web:
    build:
      context: ./web/app
      dockerfile: ../../Dockerfiles.d/web/Dockerfile
    command:
      - sh
      - -c
      - |
        npm-check-updates --upgrade
        sort-package-json
        pnpm install
        pnpm audit --fix
        pnpm install
        pnpm dev
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:4000
    working_dir: /work/web/app
    volumes:
      - .:/work
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const n=require('net');const s=n.createConnection(3000,'localhost');s.on('connect',()=>{s.destroy();process.exit(0)});s.on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  web-e2e-tests:
    build:
      context: ./web/e2e-tests
      dockerfile: ../../Dockerfiles.d/web-e2e-tests/Dockerfile
    command:
      - sh
      - -c
      - |
        npm-check-updates --upgrade
        sort-package-json
        pnpm install
        pnpm audit --fix
        pnpm install
        pnpm test
    profiles:
      - web-e2e-tests
    working_dir: /work/web/e2e-tests
    volumes:
      - .:/work
    depends_on:
      web:
        condition: service_healthy
    environment:
      BASE_URL: http://web:3000
      CI: ${CI:-}

  iac:
    build:
      context: ./iac
      dockerfile: ../Dockerfiles.d/iac/Dockerfile
    profiles:
      - iac
    working_dir: /work/iac
    volumes:
      - .:/work
    env_file:
      - .env

volumes:
  postgres_data:
