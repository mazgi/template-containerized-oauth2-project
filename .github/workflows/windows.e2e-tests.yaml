name: E2E Tests for Windows

on:
  push:
    branches: [main]
    paths:
      - 'windows/**'
      - 'backend/**'
      - 'compose.yaml'
      - 'Dockerfiles.d/backend/**'
      - '.github/workflows/windows.e2e-tests.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'windows/**'
      - 'backend/**'
      - 'compose.yaml'
      - 'Dockerfiles.d/backend/**'
      - '.github/workflows/windows.e2e-tests.yaml'
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: windows-2025
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      # --- PostgreSQL Setup ---
      # PostgreSQL 17 is preinstalled on windows-2025 but the default PGDATA
      # directory has permission issues (https://github.com/actions/runner-images/issues/13040).
      # Workaround: initialize a new data directory in RUNNER_TEMP and start with pg_ctl.
      # Uses trust auth so no password is needed for local connections.
      - name: Start PostgreSQL
        shell: pwsh
        run: |
          $env:Path = "$env:PGBIN;$env:Path"
          $pgData = Join-Path $env:RUNNER_TEMP "pgdata"
          & initdb -D $pgData -A trust -U postgres
          & pg_ctl start -D $pgData -l (Join-Path $pgData "server.log")
          for ($i = 1; $i -le 30; $i++) {
            & pg_isready -h localhost -p 5432
            if ($LASTEXITCODE -eq 0) { break }
            Start-Sleep -Seconds 1
          }
          & createdb -h localhost -U postgres localauth

      # --- Node.js + pnpm ---
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      # --- Backend Setup ---
      # Write env files into backend/ (Prisma reads from working directory).
      # Follows the macOS CI pattern: heredoc for non-secrets, echo for secrets.
      - name: Create backend .env
        shell: bash
        run: |
          cat <<'EOF' > backend/.env
          PORT=4000
          CORS_ORIGIN=http://localhost:3000
          AUTH_JWT_ACCESS_EXPIRATION=15m
          AUTH_JWT_REFRESH_EXPIRATION=7d
          FRONTEND_URL=http://localhost:3000
          NATIVE_APP_URL_SCHEME=oauth2app
          AUTH_CALLBACK_BASE_URL=http://localhost:4000
          AUTH_NATIVE_CALLBACK_BASE_URL=http://localhost:4000
          SMTP_HOST=127.0.0.1
          SMTP_PORT=1025
          EOF
          echo "AUTH_APPLE_CLIENT_ID=${{ vars.AUTH_APPLE_CLIENT_ID }}" >> backend/.env
          echo "AUTH_APPLE_TEAM_ID=${{ vars.AUTH_APPLE_TEAM_ID }}" >> backend/.env
          echo "AUTH_APPLE_KEY_ID=${{ vars.AUTH_APPLE_KEY_ID }}" >> backend/.env
          echo "AUTH_GITHUB_CLIENT_ID=${{ vars.AUTH_GITHUB_CLIENT_ID }}" >> backend/.env
          echo "AUTH_GOOGLE_CLIENT_ID=${{ vars.AUTH_GOOGLE_CLIENT_ID }}" >> backend/.env
          echo "AUTH_TWITTER_CLIENT_ID=${{ vars.AUTH_TWITTER_CLIENT_ID }}" >> backend/.env
          echo "AUTH_DISCORD_CLIENT_ID=${{ vars.AUTH_DISCORD_CLIENT_ID }}" >> backend/.env

      - name: Create backend .secrets.env
        shell: bash
        run: |
          cat <<'EOF' > backend/.secrets.env
          DATABASE_URL=postgresql://postgres@localhost:5432/localauth
          EOF
          echo "AUTH_JWT_SECRET=${{ secrets.AUTH_JWT_SECRET }}" >> backend/.secrets.env
          echo "AUTH_JWT_REFRESH_SECRET=${{ secrets.AUTH_JWT_REFRESH_SECRET }}" >> backend/.secrets.env
          echo "AUTH_APPLE_PRIVATE_KEY=${{ secrets.AUTH_APPLE_PRIVATE_KEY }}" >> backend/.secrets.env
          echo "AUTH_GITHUB_CLIENT_SECRET=${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}" >> backend/.secrets.env
          echo "AUTH_GOOGLE_CLIENT_SECRET=${{ secrets.AUTH_GOOGLE_CLIENT_SECRET }}" >> backend/.secrets.env
          echo "AUTH_TWITTER_CLIENT_SECRET=${{ secrets.AUTH_TWITTER_CLIENT_SECRET }}" >> backend/.secrets.env
          echo "AUTH_SESSION_SECRET=${{ secrets.AUTH_SESSION_SECRET }}" >> backend/.secrets.env
          echo "AUTH_DISCORD_CLIENT_SECRET=${{ secrets.AUTH_DISCORD_CLIENT_SECRET }}" >> backend/.secrets.env

      - name: Download Mailpit
        # Mailpit is needed for email verification in E2E tests.
        # The backend sends verification emails via SMTP to Mailpit (port 1025),
        # and the test helpers retrieve tokens via the Mailpit API (port 8025).
        shell: pwsh
        run: |
          $url = "https://github.com/axllent/mailpit/releases/latest/download/mailpit-windows-amd64.zip"
          $zip = Join-Path $env:RUNNER_TEMP "mailpit.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath $env:RUNNER_TEMP -Force

      - name: Start Mailpit
        # Use bash + nohup to keep Mailpit alive (same pattern as backend).
        # PowerShell Start-Process -NoNewWindow can let the process die on CI.
        # Bind to 127.0.0.1 explicitly — on Windows, Mailpit defaults to [::] (IPv6)
        # but the backend resolves localhost to 127.0.0.1 (IPv4), causing ECONNREFUSED.
        shell: bash
        run: |
          nohup "$RUNNER_TEMP/mailpit.exe" --smtp 127.0.0.1:1025 --listen 127.0.0.1:8025 > "$RUNNER_TEMP/mailpit.log" 2>&1 &
          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:8025/api/v1/messages > /dev/null && echo "Mailpit is ready." && break
            echo "  waiting for Mailpit... attempt $i/15"
            sleep 1
          done

      - name: Install backend dependencies
        working-directory: backend
        run: pnpm install

      - name: Generate Prisma client and push schema
        working-directory: backend
        run: |
          pnpm prisma:generate
          pnpm prisma:push

      - name: Start backend
        working-directory: backend
        shell: bash
        run: |
          set -a && source .env && source .secrets.env && set +a
          export GIT_SHA=${GITHUB_SHA::7}
          nohup pnpm dev > $RUNNER_TEMP/backend.log 2>&1 &

      - name: Wait for backend to be ready
        shell: bash
        run: |
          echo "Waiting for backend at http://localhost:4000..."
          for i in $(seq 1 36); do
            curl -sf http://localhost:4000/api > /dev/null && echo "Backend is ready." && break
            echo "  attempt $i/36 - retrying in 5s..."
            sleep 5
          done

      # --- Enable Developer Mode ---
      # Required for both WinAppDriver and MSIX sideloading (Add-AppxPackage -Register).
      - name: Enable Developer Mode
        shell: cmd
        run: reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /f /v "AllowDevelopmentWithoutDevLicense" /d "1"

      # --- Build and Deploy WinUI App ---
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('windows/**/*.csproj') }}
          restore-keys: |
            nuget-

      - name: Build WinUI app
        run: dotnet build windows/app/app.csproj -c Debug -p:Platform=x64

      - name: Install Windows App SDK runtime
        # The WinUI 3 app depends on Microsoft.WindowsAppRuntime.1.8 framework which is
        # not preinstalled on CI runners. Download the installer directly from Microsoft.
        shell: pwsh
        run: |
          $url = "https://aka.ms/windowsappsdk/1.8/latest/windowsappruntimeinstall-x64.exe"
          $installer = Join-Path $env:RUNNER_TEMP "WindowsAppRuntimeInstall.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Write-Host "Installing Windows App Runtime..."
          & $installer --quiet --force
          Write-Host "Installer exited with code $LASTEXITCODE"

      - name: Deploy MSIX package (loose registration)
        shell: pwsh
        run: Add-AppxPackage -Register "windows\app\bin\x64\Debug\net8.0-windows10.0.19041.0\win-x64\AppxManifest.xml"

      - name: Get Package Family Name
        id: pkg
        shell: pwsh
        run: |
          $pkg = Get-AppxPackage | Where-Object { $_.Name -like "*f0af5309*" }
          $appId = "$($pkg.PackageFamilyName)!App"
          echo "APP_ID=$appId" >> $env:GITHUB_OUTPUT
          echo "Package Family Name: $appId"

      # --- Appium Setup ---
      # WinAppDriver is preinstalled on windows-2025 runners.
      # appium-windows-driver discovers it automatically from the default path.
      # Pin Appium 3 + windows-driver 5 (driver v5 requires Appium 3).
      # Use --source=npm to bypass the Appium driver registry and install
      # the exact version directly from npm.
      - name: Install Appium and Windows driver
        run: |
          npm install -g appium@3
          appium driver install --source=npm appium-windows-driver@5

      - name: Start Appium server
        shell: bash
        run: |
          # appium-windows-driver resolves 'appium/driver' at runtime.
          # Since Appium is installed globally and the driver lives in ~/.appium,
          # Node.js cannot find it without NODE_PATH pointing to global node_modules.
          export NODE_PATH="$(npm root -g)"
          nohup appium server --log "$RUNNER_TEMP/appium.log" 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4723/status > /dev/null && echo "Appium server is ready." && break
            echo "  attempt $i/30 - retrying in 2s..."
            sleep 2
          done

      # --- Run E2E Tests ---
      - name: Run Windows E2E tests
        shell: pwsh
        run: |
          $runsettings = @"
          <?xml version="1.0" encoding="utf-8"?>
          <RunSettings>
            <TestRunParameters>
              <Parameter name="AppId" value="${{ steps.pkg.outputs.APP_ID }}" />
            </TestRunParameters>
          </RunSettings>
          "@
          $settingsPath = "$env:RUNNER_TEMP\test.runsettings"
          $runsettings | Out-File -FilePath $settingsPath -Encoding utf8
          dotnet test windows/e2e-tests/e2e-tests.csproj --settings $settingsPath --logger "trx;LogFileName=results.trx"

      # --- Artifacts and Cleanup ---
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-e2e-test-results
          path: windows/e2e-tests/TestResults/
          retention-days: 7

      - name: Print backend logs on failure
        if: failure()
        shell: bash
        run: cat $RUNNER_TEMP/backend.log || true

      - name: Print Mailpit logs on failure
        if: failure()
        shell: bash
        run: cat $RUNNER_TEMP/mailpit.log || true

      - name: Print Appium logs on failure
        if: failure()
        shell: pwsh
        run: Get-Content "$env:RUNNER_TEMP\appium.log" -ErrorAction SilentlyContinue
