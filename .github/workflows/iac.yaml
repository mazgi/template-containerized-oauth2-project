name: IaC Persistent

on:
  pull_request:
    branches: [main]
    paths:
      - 'iac/aws/*'
      - 'iac/azure/*'
      - 'iac/google/*'
      - '.github/workflows/iac.yaml'
  push:
    branches: [main]
    paths:
      - 'iac/aws/*'
      - 'iac/azure/*'
      - 'iac/google/*'
      - '.github/workflows/iac.yaml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      providers: ${{ steps.set-providers.outputs.providers }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed providers
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            aws:
              - 'iac/aws/*'
            azure:
              - 'iac/azure/*'
            google:
              - 'iac/google/*'

      - name: Set provider matrix
        id: set-providers
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'providers=["aws","azure","google"]' >> $GITHUB_OUTPUT
          else
            providers="[]"
            if [ "${{ steps.filter.outputs.aws }}" = "true" ]; then
              providers=$(echo "$providers" | jq -c '. + ["aws"]')
            fi
            if [ "${{ steps.filter.outputs.azure }}" = "true" ]; then
              providers=$(echo "$providers" | jq -c '. + ["azure"]')
            fi
            if [ "${{ steps.filter.outputs.google }}" = "true" ]; then
              providers=$(echo "$providers" | jq -c '. + ["google"]')
            fi
            echo "providers=$providers" >> $GITHUB_OUTPUT
          fi

  plan-apply:
    needs: detect-changes
    if: needs.detect-changes.outputs.providers != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJson(needs.detect-changes.outputs.providers) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        if: matrix.provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: us-east-1

      - name: Authenticate to Azure
        if: matrix.provider == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Set Azure OIDC environment for Terraform
        if: matrix.provider == 'azure'
        run: |
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.ARM_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.ARM_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.ARM_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      - name: Authenticate to GCP
        if: matrix.provider == 'google'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Bootstrap S3 tfstate backend
        if: matrix.provider == 'aws'
        uses: ./.github/actions/bootstrap-tfstate-s3
        with:
          bucket: ${{ vars.AWS_TF_STATE_BUCKET }}
          region: ${{ vars.AWS_TF_STATE_REGION }}

      - name: Bootstrap Azure tfstate backend
        if: matrix.provider == 'azure'
        uses: ./.github/actions/bootstrap-tfstate-azurerm
        with:
          resource-group: ${{ vars.AZURE_TF_STATE_RESOURCE_GROUP }}
          storage-account: ${{ vars.AZURE_TF_STATE_STORAGE_ACCOUNT }}
          location: ${{ vars.AZURE_TF_STATE_LOCATION }}

      - name: Bootstrap GCS tfstate backend
        if: matrix.provider == 'google'
        uses: ./.github/actions/bootstrap-tfstate-gcs
        with:
          bucket: ${{ vars.GCP_TF_STATE_BUCKET }}
          location: ${{ vars.GCP_TF_STATE_LOCATION }}
          project-id: ${{ vars.GCP_PROJECT_ID }}

      - name: Terraform Init
        run: |
          case "${{ matrix.provider }}" in
            aws)
              terraform -chdir=iac/aws init \
                -backend-config="bucket=${{ vars.AWS_TF_STATE_BUCKET }}" \
                -backend-config="region=${{ vars.AWS_TF_STATE_REGION }}"
              ;;
            azure)
              terraform -chdir=iac/azure init \
                -backend-config="resource_group_name=${{ vars.AZURE_TF_STATE_RESOURCE_GROUP }}" \
                -backend-config="storage_account_name=${{ vars.AZURE_TF_STATE_STORAGE_ACCOUNT }}" \
                -backend-config="container_name=tfstate"
              ;;
            google)
              terraform -chdir=iac/google init \
                -backend-config="bucket=${{ vars.GCP_TF_STATE_BUCKET }}"
              ;;
          esac

      - name: Terraform Validate
        run: terraform -chdir=iac/${{ matrix.provider }} validate

      - name: Terraform Plan
        env:
          TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_azure_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_azure_container_registry_name: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
          TF_VAR_base_domain_name: ${{ vars.TF_VAR_BASE_DOMAIN_NAME }}
        run: |
          terraform -chdir=iac/${{ matrix.provider }} plan -no-color -input=false 2>&1 | tee plan-output.txt
          {
            echo "### Terraform Plan — ${{ matrix.provider }}"
            echo '```'
            cat plan-output.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_azure_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_azure_container_registry_name: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
          TF_VAR_base_domain_name: ${{ vars.TF_VAR_BASE_DOMAIN_NAME }}
        run: terraform -chdir=iac/${{ matrix.provider }} apply -auto-approve -input=false
