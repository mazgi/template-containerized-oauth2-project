name: E2E Tests for Web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'backend/**'
      - 'compose.yaml'
      - 'Dockerfiles.d/backend/**'
      - 'Dockerfiles.d/web/**'
      - '.github/workflows/web.e2e-tests.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - 'backend/**'
      - 'compose.yaml'
      - 'Dockerfiles.d/backend/**'
      - 'Dockerfiles.d/web/**'
      - '.github/workflows/web.e2e-tests.yaml'
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat <<'EOF' > .env
          DATABASE_URL=postgresql://postgres:password@db:5432/localauth
          PORT=4000
          CORS_ORIGIN=http://localhost:3000,http://web:3000
          AUTH_JWT_ACCESS_EXPIRATION=15m
          AUTH_JWT_REFRESH_EXPIRATION=7d
          FRONTEND_URL=http://localhost:3000
          NATIVE_APP_URL_SCHEME=oauth2app
          AUTH_APPLE_CALLBACK_URL=http://localhost:4000/auth/apple/callback
          AUTH_APPLE_NATIVE_CALLBACK_URL=http://localhost:4000/auth/apple/native/callback
          AUTH_GITHUB_CALLBACK_URL=http://localhost:4000/auth/github/callback
          AUTH_GITHUB_NATIVE_CALLBACK_URL=http://localhost:4000/auth/github/native/callback
          AUTH_GOOGLE_CALLBACK_URL=http://localhost:4000/auth/google/callback
          AUTH_GOOGLE_NATIVE_CALLBACK_URL=http://localhost:4000/auth/google/native/callback
          AUTH_TWITTER_CALLBACK_URL=http://localhost:4000/auth/twitter/callback
          AUTH_TWITTER_NATIVE_CALLBACK_URL=http://localhost:4000/auth/twitter/native/callback
          AUTH_DISCORD_CALLBACK_URL=http://localhost:4000/auth/discord/callback
          AUTH_DISCORD_NATIVE_CALLBACK_URL=http://localhost:4000/auth/discord/native/callback
          EOF
          echo "AUTH_JWT_SECRET=${{ secrets.AUTH_JWT_SECRET }}" >> .env
          echo "AUTH_JWT_REFRESH_SECRET=${{ secrets.AUTH_JWT_REFRESH_SECRET }}" >> .env
          echo "AUTH_APPLE_CLIENT_ID=${{ secrets.AUTH_APPLE_CLIENT_ID }}" >> .env
          echo "AUTH_APPLE_TEAM_ID=${{ secrets.AUTH_APPLE_TEAM_ID }}" >> .env
          echo "AUTH_APPLE_KEY_ID=${{ secrets.AUTH_APPLE_KEY_ID }}" >> .env
          echo "AUTH_APPLE_PRIVATE_KEY=${{ secrets.AUTH_APPLE_PRIVATE_KEY }}" >> .env
          echo "AUTH_GITHUB_CLIENT_ID=${{ secrets.AUTH_GITHUB_CLIENT_ID }}" >> .env
          echo "AUTH_GITHUB_CLIENT_SECRET=${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}" >> .env
          echo "AUTH_GOOGLE_CLIENT_ID=${{ secrets.AUTH_GOOGLE_CLIENT_ID }}" >> .env
          echo "AUTH_GOOGLE_CLIENT_SECRET=${{ secrets.AUTH_GOOGLE_CLIENT_SECRET }}" >> .env
          echo "AUTH_TWITTER_CLIENT_ID=${{ secrets.AUTH_TWITTER_CLIENT_ID }}" >> .env
          echo "AUTH_TWITTER_CLIENT_SECRET=${{ secrets.AUTH_TWITTER_CLIENT_SECRET }}" >> .env
          echo "AUTH_SESSION_SECRET=${{ secrets.AUTH_SESSION_SECRET }}" >> .env
          echo "AUTH_DISCORD_CLIENT_ID=${{ secrets.AUTH_DISCORD_CLIENT_ID }}" >> .env
          echo "AUTH_DISCORD_CLIENT_SECRET=${{ secrets.AUTH_DISCORD_CLIENT_SECRET }}" >> .env

      - name: Build images
        run: docker compose --profile web-e2e-tests build

      - name: Run E2E tests
        # The web-e2e-tests profile starts db → backend (runs
        # prisma db push automatically) → web → web-e2e-tests in order,
        # waiting for each healthcheck before proceeding.
        run: |
          docker compose --profile web-e2e-tests up \
            --exit-code-from web-e2e-tests \
            --abort-on-container-exit

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/e2e-tests/playwright-report/
          retention-days: 7

      - name: Stop all services
        if: always()
        run: docker compose --profile web-e2e-tests down -v
