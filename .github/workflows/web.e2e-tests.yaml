name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat <<'EOF' > .env
          DATABASE_URL=postgresql://postgres:password@db:5432/localauth
          NEXTAUTH_URL=http://web-app:3000
          EOF
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env

      - name: Build images
        run: docker compose --profile web-e2e-tests build

      - name: Start database and wait for healthy
        run: docker compose up db --wait

      - name: Run database migrations
        run: |
          docker compose run --rm web-app \
            sh -c "pnpm install --frozen-lockfile && pnpm exec prisma migrate deploy"

      - name: Run E2E tests
        run: |
          docker compose --profile web-e2e-tests up \
            --exit-code-from web-e2e-tests \
            --abort-on-container-exit

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/e2e-tests/playwright-report/
          retention-days: 7

      - name: Stop all services
        if: always()
        run: docker compose --profile web-e2e-tests down -v
