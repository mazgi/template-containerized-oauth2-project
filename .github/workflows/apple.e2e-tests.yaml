name: E2E Tests for Apple platforms

on:
  push:
    branches: [main]
    paths:
      - 'apple/**'
      - 'backend/**'
      - 'compose.yaml'
      - 'Dockerfiles.d/backend/**'
      - '.github/workflows/apple.e2e-tests.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'apple/**'
      - 'backend/**'
      - 'compose.yaml'
      - 'Dockerfiles.d/backend/**'
      - '.github/workflows/apple.e2e-tests.yaml'
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: macos-26
    timeout-minutes: 60
    env:
      # See https://github.com/maxim-lobanov/setup-xcode/pull/98
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install and start PostgreSQL 17
        # Install PostgreSQL 17 to match the project's database version.
        # brew install is a no-op if already present.
        # Create database as runner (current OS user) to avoid peer auth issues:
        #   macOS socket auth requires OS user == PostgreSQL user, so
        #   `createdb -U postgres` would be denied when OS user is `runner`.
        # Append trust rules to pg_hba.conf so Prisma can connect via TCP
        # regardless of the runner's default auth method.
        run: |
          brew install postgresql@17
          brew services start postgresql@17
          # postgresql@17 is keg-only; add its bin to PATH for this step
          export PATH="/opt/homebrew/opt/postgresql@17/bin:$PATH"
          # `timeout` is not available on macOS; use a for loop instead
          for i in $(seq 1 30); do pg_isready -h localhost -p 5432 && break; sleep 1; done
          createdb localauth
          psql -d localauth -c "CREATE ROLE postgres WITH LOGIN SUPERUSER PASSWORD 'password';"
          PG_DATA=$(psql -d localauth -c "SHOW data_directory;" -t | xargs)
          printf 'host all all 127.0.0.1/32 trust\nhost all all ::1/128 trust\n' >> "$PG_DATA/pg_hba.conf"
          psql -d localauth -c "SELECT pg_reload_conf();"

      - name: Create backend .env
        run: |
          cat <<'EOF' > backend/.env
          PORT=4000
          CORS_ORIGIN=http://localhost:3000
          AUTH_JWT_ACCESS_EXPIRATION=15m
          AUTH_JWT_REFRESH_EXPIRATION=7d
          FRONTEND_URL=http://localhost:3000
          NATIVE_APP_URL_SCHEME=oauth2app
          AUTH_CALLBACK_BASE_URL=http://localhost:4000
          AUTH_NATIVE_CALLBACK_BASE_URL=http://localhost:4000
          SMTP_HOST=localhost
          SMTP_PORT=1025
          EOF
          echo "AUTH_APPLE_CLIENT_ID=${{ vars.AUTH_APPLE_CLIENT_ID }}" >> backend/.env
          echo "AUTH_APPLE_TEAM_ID=${{ vars.AUTH_APPLE_TEAM_ID }}" >> backend/.env
          echo "AUTH_APPLE_KEY_ID=${{ vars.AUTH_APPLE_KEY_ID }}" >> backend/.env
          echo "AUTH_GITHUB_CLIENT_ID=${{ vars.AUTH_GITHUB_CLIENT_ID }}" >> backend/.env
          echo "AUTH_GOOGLE_CLIENT_ID=${{ vars.AUTH_GOOGLE_CLIENT_ID }}" >> backend/.env
          echo "AUTH_TWITTER_CLIENT_ID=${{ vars.AUTH_TWITTER_CLIENT_ID }}" >> backend/.env
          echo "AUTH_DISCORD_CLIENT_ID=${{ vars.AUTH_DISCORD_CLIENT_ID }}" >> backend/.env

      - name: Create backend .secrets.env
        # Append secrets separately so GitHub Actions can expand ${{ secrets.* }}.
        # Prisma reads .secrets.env from the working directory (backend/).
        run: |
          cat <<'EOF' > backend/.secrets.env
          DATABASE_URL=postgresql://postgres:password@localhost:5432/localauth
          EOF
          echo "AUTH_JWT_SECRET=${{ secrets.AUTH_JWT_SECRET }}" >> backend/.secrets.env
          echo "AUTH_JWT_REFRESH_SECRET=${{ secrets.AUTH_JWT_REFRESH_SECRET }}" >> backend/.secrets.env
          echo "AUTH_APPLE_PRIVATE_KEY=${{ secrets.AUTH_APPLE_PRIVATE_KEY }}" >> backend/.secrets.env
          echo "AUTH_GITHUB_CLIENT_SECRET=${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}" >> backend/.secrets.env
          echo "AUTH_GOOGLE_CLIENT_SECRET=${{ secrets.AUTH_GOOGLE_CLIENT_SECRET }}" >> backend/.secrets.env
          echo "AUTH_TWITTER_CLIENT_SECRET=${{ secrets.AUTH_TWITTER_CLIENT_SECRET }}" >> backend/.secrets.env
          echo "AUTH_SESSION_SECRET=${{ secrets.AUTH_SESSION_SECRET }}" >> backend/.secrets.env
          echo "AUTH_DISCORD_CLIENT_SECRET=${{ secrets.AUTH_DISCORD_CLIENT_SECRET }}" >> backend/.secrets.env

      - name: Install and start Mailpit
        # Mailpit is needed for email verification in E2E tests.
        # The backend sends verification emails via SMTP to Mailpit (port 1025),
        # and the test helpers retrieve tokens via the Mailpit API (port 8025).
        run: |
          brew install mailpit
          mailpit &
          for i in $(seq 1 15); do curl -sf http://localhost:8025/api/v1/messages > /dev/null && break; sleep 1; done
          echo "Mailpit is ready."

      - name: Install backend dependencies
        working-directory: backend
        run: pnpm install

      - name: Generate Prisma client and push schema
        working-directory: backend
        run: |
          pnpm prisma:generate
          pnpm prisma:push

      - name: Start backend
        # main.ts has no dotenv loading; Docker passes vars via env_file, but
        # native startup requires explicit sourcing of env files before the process starts.
        # set -a exports all vars set by source, so pnpm dev inherits them.
        # GIT_SHA is set so the /health endpoint returns the commit SHA.
        working-directory: backend
        run: |
          set -a && source .env && source .secrets.env && set +a
          export GIT_SHA=${GITHUB_SHA::7}
          nohup pnpm dev > /tmp/backend.log 2>&1 &

      - name: Wait for backend to be ready
        # prisma db push + nest start --watch takes up to ~60s on first run.
        # Poll until the Swagger UI (GET /api) responds.
        run: |
          echo "Waiting for backend at http://localhost:4000..."
          for i in $(seq 1 24); do
            curl -sf http://localhost:4000/api > /dev/null && echo "Backend is ready." && break
            echo "  attempt $i/24 — retrying in 5s..."
            sleep 5
          done

      - name: Install iOS Simulator runtime
        # Starting with Xcode 26, the iOS Simulator runtime is a separate
        # downloadable component and is no longer bundled with Xcode.
        # Install it so that simulator destinations are available for testing.
        run: |
          xcodebuild -downloadPlatform iOS
          xcrun simctl list runtimes

      - name: List available iOS simulators
        # Print available simulators so the destination can be adjusted if needed.
        run: xcrun simctl list devices available | grep -i iphone

      - name: Cache Xcode derived data
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: xcode-deriveddata-${{ hashFiles('apple/**/*.swift', 'apple/**/*.xcodeproj/**') }}
          restore-keys: |
            xcode-deriveddata-

      - name: Generate BuildConfig.generated.swift
        # The Xcode Run Script build phase that normally generates this file
        # may be blocked by script sandboxing on newer Xcode versions in CI.
        # Pre-generate it so the build always finds it.
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          printf '// Auto-generated — do not edit manually\nenum BuildConfig {\n    static let gitSHA = "%s"\n}\n' "$SHA" > apple/app/BuildConfig.generated.swift

      - name: Run iOS E2E tests
        # Use the same simulator as local development (CLAUDE.md: iPhone 17).
        # If this simulator is unavailable on the runner, check the list step above
        # and update the destination accordingly.
        # -parallel-testing-enabled NO: Xcode 26 enables parallel testing by default,
        # spinning up multiple simulator clones (Clone 1, Clone 2, ...) that run tests
        # concurrently. On a single CI machine this causes CPU/memory contention between
        # simulator instances and the backend, leading to API timeouts and flaky failures.
        # Sequential execution eliminates this contention.
        # When multiple simulators share the same name (e.g. parallel-testing clones),
        # xcodebuild fails with "multiple devices matched". Resolve the UDID of the
        # first match and pass id= to avoid ambiguity.
        run: |
          SIM_UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          # Prefer the latest runtime – iterate in reverse so newer runtimes win.
          best = None
          for runtime, devices in data['devices'].items():
              for d in devices:
                  if d['name'] == 'iPhone 17' and d['isAvailable']:
                      best = d['udid']
          if best:
              print(best)
              sys.exit(0)
          sys.exit(1)
          ")
          echo "Using simulator UDID: $SIM_UDID"
          xcodebuild test \
            -project apple/app.xcodeproj \
            -scheme app \
            -destination "platform=iOS Simulator,id=$SIM_UDID" \
            -only-testing:appUITests \
            -parallel-testing-enabled NO \
            -resultBundlePath /tmp/ios-e2e-results.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-e2e-test-results
          path: /tmp/ios-e2e-results.xcresult
          retention-days: 7

      - name: Print backend logs on failure
        if: failure()
        run: cat /tmp/backend.log || true
