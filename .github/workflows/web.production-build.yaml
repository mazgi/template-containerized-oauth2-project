name: Build & publish web image

on:
  push:
    branches: [main]
    paths:
      - 'web/app/**'
      - 'Dockerfiles.d/web-production/**'
      - '.github/workflows/web.production-build.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'web/app/**'
      - 'Dockerfiles.d/web-production/**'
      - '.github/workflows/web.production-build.yaml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v4
        with:
          context: ./web/app
          file: Dockerfiles.d/web-production/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: |
          echo "Image pushed with digest: ${{ steps.build.outputs.digest }}"
