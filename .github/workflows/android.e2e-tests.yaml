name: E2E Tests for Android

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'backend/**'
      - 'compose.yaml'
      - 'Dockerfiles.d/backend/**'
      - '.github/workflows/android.e2e-tests.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - 'backend/**'
      - 'compose.yaml'
      - 'Dockerfiles.d/backend/**'
      - '.github/workflows/android.e2e-tests.yaml'
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android platform SDK 36
        # The app is compiled against SDK 36 (compileSdk = release(36)).
        # GitHub Actions runners do not pre-install API 36, so we install it here.
        # The emulator itself runs API 35 (stable); the app is backwards-compatible
        # down to minSdk 24.
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36"

      - name: Create .env
        run: |
          cat <<'EOF' > .env
          PORT=4000
          CORS_ORIGIN=http://localhost:3000
          AUTH_JWT_ACCESS_EXPIRATION=15m
          AUTH_JWT_REFRESH_EXPIRATION=7d
          FRONTEND_URL=http://localhost:3000
          NATIVE_APP_URL_SCHEME=oauth2app
          AUTH_CALLBACK_BASE_URL=http://localhost:4000
          AUTH_NATIVE_CALLBACK_BASE_URL=http://localhost:4000
          EOF
          # Match the container user to the runner so bind-mounted files are writable.
          # Docker Compose auto-reads .env for build-arg interpolation (${UID:-1000}, ${GID:-1000}).
          echo "UID=$(id -u)" >> .env
          echo "GID=$(id -g)" >> .env
          echo "AUTH_APPLE_CLIENT_ID=${{ vars.AUTH_APPLE_CLIENT_ID }}" >> .env
          echo "AUTH_APPLE_TEAM_ID=${{ vars.AUTH_APPLE_TEAM_ID }}" >> .env
          echo "AUTH_APPLE_KEY_ID=${{ vars.AUTH_APPLE_KEY_ID }}" >> .env
          echo "AUTH_GITHUB_CLIENT_ID=${{ vars.AUTH_GITHUB_CLIENT_ID }}" >> .env
          echo "AUTH_GOOGLE_CLIENT_ID=${{ vars.AUTH_GOOGLE_CLIENT_ID }}" >> .env
          echo "AUTH_TWITTER_CLIENT_ID=${{ vars.AUTH_TWITTER_CLIENT_ID }}" >> .env
          echo "AUTH_DISCORD_CLIENT_ID=${{ vars.AUTH_DISCORD_CLIENT_ID }}" >> .env

      - name: Create .secrets.env
        run: |
          cat <<'EOF' > .secrets.env
          DATABASE_URL=postgresql://postgres:password@db:5432/localauth
          EOF
          echo "AUTH_JWT_SECRET=${{ secrets.AUTH_JWT_SECRET }}" >> .secrets.env
          echo "AUTH_JWT_REFRESH_SECRET=${{ secrets.AUTH_JWT_REFRESH_SECRET }}" >> .secrets.env
          echo "AUTH_APPLE_PRIVATE_KEY=${{ secrets.AUTH_APPLE_PRIVATE_KEY }}" >> .secrets.env
          echo "AUTH_GITHUB_CLIENT_SECRET=${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}" >> .secrets.env
          echo "AUTH_GOOGLE_CLIENT_SECRET=${{ secrets.AUTH_GOOGLE_CLIENT_SECRET }}" >> .secrets.env
          echo "AUTH_TWITTER_CLIENT_SECRET=${{ secrets.AUTH_TWITTER_CLIENT_SECRET }}" >> .secrets.env
          echo "AUTH_SESSION_SECRET=${{ secrets.AUTH_SESSION_SECRET }}" >> .secrets.env
          echo "AUTH_DISCORD_CLIENT_SECRET=${{ secrets.AUTH_DISCORD_CLIENT_SECRET }}" >> .secrets.env

      - name: Start backend services
        # backend depends_on db; both start here automatically.
        # compose.yaml maps port 4000 to the host. The Android emulator reaches
        # the backend via 10.0.2.2:4000 (standard emulator loopback to host).
        run: docker compose up backend -d

      - name: Wait for backend to be ready
        # backend runs prisma db push + pnpm dev on startup, which takes
        # up to ~2 minutes. Poll until the Swagger UI (GET /api) responds.
        run: |
          echo "Waiting for backend at http://localhost:4000 ..."
          timeout 180 bash -c \
            'until curl -sf http://localhost:4000/api > /dev/null; do sleep 5; done'
          echo "Backend is ready."

      - name: Enable KVM for the Android emulator
        # ubuntu-latest supports KVM. These udev rules grant the runner user
        # access to /dev/kvm for hardware-accelerated emulation.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD snapshot
        # Cache the AVD so subsequent runs skip the slow emulator creation step.
        # Bump the cache key suffix (e.g. -v2) to force recreation when needed.
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-35-google_apis-x86_64-v1

      - name: Create AVD snapshot (cache miss only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD snapshot created for caching."

      - name: Run Android E2E tests
        # android-emulator-runner boots the AVD, waits until it is fully ready,
        # executes the script, and then shuts down the emulator.
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: cd android && ./gradlew connectedAndroidTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-e2e-test-results
          path: android/app/build/reports/androidTests/
          retention-days: 7

      - name: Stop backend services
        if: always()
        run: docker compose down -v
